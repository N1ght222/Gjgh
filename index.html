<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love You:з</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Playfair+Display:ital@0;1&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0a;
    overflow: hidden;
    height: 100vh; width: 100vw;
    font-family: 'Share Tech Mono', monospace;
    color: #fff;
  }

  #screen-intro {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 10;
    transition: opacity 0.9s ease;
  }
  #screen-intro.hidden { opacity: 0; pointer-events: none; }

  .title-big {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(2.4rem, 8vw, 5rem);
    color: #fff;
    margin-bottom: 2.4rem;
    text-shadow: 0 0 40px rgba(255,50,50,0.45);
    opacity: 0;
    animation: fadeDown 1s 0.3s forwards;
  }

  .terminal-box {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(220,40,40,0.3);
    border-radius: 6px;
    padding: 1.5rem 2rem;
    max-width: 420px; width: 90vw;
    opacity: 0;
    animation: fadeUp 1s 0.8s forwards;
  }

  .t-line {
    color: #ff4444; font-size: 0.8rem;
    margin-bottom: 0.8rem;
    white-space: nowrap; overflow: hidden; width: 0;
  }
  .t-line.l1 { animation: type1 1.5s steps(40) 1.2s forwards; border-right: 2px solid #ff4444; }
  .t-line.l2 { animation: type2 1.2s steps(35) 2.9s forwards; }
  .spacer { height: 1rem; opacity: 0; animation: fadeIn 0.1s 4.2s forwards; }

  .btn {
    display: block; width: 100%;
    padding: 0.75rem 1rem;
    background: #e02020; border: none; border-radius: 4px;
    color: #fff; font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem; letter-spacing: 0.12em;
    cursor: pointer; text-transform: uppercase;
    transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
    opacity: 0; animation: fadeIn 0.5s 4.4s forwards;
  }
  .btn:hover { background: #ff4444; box-shadow: 0 0 20px rgba(255,50,50,0.5); transform: translateY(-1px); }
  .btn:active { transform: translateY(1px); }

  .hint {
    text-align: center; color: rgba(255,255,255,0.22);
    font-size: 0.68rem; margin-top: 0.6rem;
    opacity: 0; animation: fadeIn 0.5s 4.6s forwards;
  }

  #screen-heart {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 5;
    opacity: 0; pointer-events: none;
    transition: opacity 1s ease;
  }
  #screen-heart.visible { opacity: 1; pointer-events: all; }
  #screen-heart::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 58% 52% at 50% 47%, rgba(150,15,15,0.25) 0%, transparent 70%);
    pointer-events: none;
  }

  canvas { display: block; }

  .love-text {
    position: absolute;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1.3rem, 4.5vw, 2.6rem);
    color: #fff;
    text-shadow: 0 0 28px rgba(255,100,100,0.9), 0 0 55px rgba(255,40,40,0.45);
    opacity: 0; transition: opacity 1.2s 0.7s;
    pointer-events: none; user-select: none;
  }
  #screen-heart.visible .love-text { opacity: 1; }

  @keyframes fadeDown { from{opacity:0;transform:translateY(-18px)} to{opacity:1;transform:none} }
  @keyframes fadeUp   { from{opacity:0;transform:translateY(18px)}  to{opacity:1;transform:none} }
  @keyframes fadeIn   { to{opacity:1} }
  @keyframes type1 { from{width:0} to{width:100%;border-right-color:transparent} }
  @keyframes type2 { from{width:0} to{width:100%} }
</style>
</head>
<body>

<div id="screen-intro">
  <div class="title-big">Love you.</div>
  <div class="terminal-box">
    <div class="t-line l1">[System] Initializing heart.PROTOCOL_v2.0 ...</div>
    <div class="t-line l2">&gt; One encrypted package found for you.</div>
    <div class="spacer"></div>
    <button class="btn" id="decryptBtn">🔒 Decrypt Message</button>
    <div class="hint">(or just click anywhere)</div>
  </div>
</div>

<div id="screen-heart">
  <canvas id="c"></canvas>
  <div class="love-text">Love you.</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function setSize() {
  const s = Math.min(window.innerWidth, window.innerHeight) * 0.94;
  canvas.width = canvas.height = s;
}
setSize();
window.addEventListener('resize', () => { setSize(); initParticles(); });

function heartPos(t, scale) {
  const x =  16 * Math.pow(Math.sin(t), 3);
  const y = -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
  return { x: x * scale, y: y * scale };
}

// Previous fracs: 0.052, 0.100, 0.148, 0.196, 0.244, 0.292, 0.342, 0.392, 0.444
// Gap between each was ~0.048. Now gap = ~0.096 (2x), starting from same base.
// But we only fit 5 orbits before hitting screen edge (~0.444 max).
// So: 9 orbits with 2x spacing → up to frac 0.052 + 8*0.096 = 0.82 — too big.
// Solution: keep 9 orbits but cap largest at ~0.46, so step = (0.46-0.052)/8 = 0.051
// That IS the old spacing. "2x spacing" means we keep fewer orbits or accept bigger canvas use.
// Best interpretation: double the gap, use 5 orbits that fit well on screen.
// Actually let's keep all 9 but spread them so they go edge-to-edge properly:
// start=0.045, step=0.096 → 0.045,0.141,0.237,0.333,0.429,0.525... too big.
// Use start=0.04, step=0.072 → fits 7 orbits up to 0.472. Good.
const ORBIT_DEFS = [
  { frac: 0.040, words: 15,  speed: 0.18,  dir: -1, fontSize: 6.3,  color: [255,160,160] },
  { frac: 0.112, words: 24,  speed: 0.13,  dir:  1, fontSize: 6.6,  color: [255,120,120] },
  { frac: 0.184, words: 33,  speed: 0.10,  dir: -1, fontSize: 6.9,  color: [245, 85, 85] },
  { frac: 0.256, words: 42,  speed: 0.08,  dir:  1, fontSize: 7.2,  color: [228, 58, 58] },
  { frac: 0.328, words: 52,  speed: 0.065, dir: -1, fontSize: 7.5,  color: [210, 40, 40] },
  { frac: 0.400, words: 63,  speed: 0.053, dir:  1, fontSize: 7.8,  color: [192, 26, 26] },
  { frac: 0.472, words: 75,  speed: 0.043, dir: -1, fontSize: 8.1,  color: [174, 16, 16] },
];

let orbits = [];

function initParticles() {
  orbits = ORBIT_DEFS.map(def => {
    const scale = (canvas.width * def.frac) / 16;
    const particles = Array.from({ length: def.words }, (_, j) => ({
      phase: (j / def.words) * Math.PI * 2
    }));
    return { ...def, scale, particles };
  });
}
initParticles();

let running = false, lastTs = null;
const LABEL = 'i love you';

function frame(ts) {
  if (!running) return;
  if (!lastTs) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  const S  = canvas.width;
  const cx = S / 2;
  const cy = S / 2 + S * 0.04;

  ctx.clearRect(0, 0, S, S);

  orbits.forEach(orb => {
    const angSpeed = orb.dir * orb.speed * Math.PI * 2;
    const [r, g, b] = orb.color;

    ctx.font         = `bold ${orb.fontSize}px 'Share Tech Mono', monospace`;
    ctx.fillStyle    = `rgba(${r},${g},${b},0.9)`;
    ctx.shadowColor  = `rgba(255,80,80,0.55)`;
    ctx.shadowBlur   = 6;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';

    orb.particles.forEach(p => {
      p.phase += angSpeed * dt;
      const pos = heartPos(p.phase, orb.scale);
      ctx.fillText(LABEL, cx + pos.x, cy + pos.y);
    });
  });

  ctx.shadowBlur = 0;
  requestAnimationFrame(frame);
}

function start() {
  if (running) return;
  running = true; lastTs = null;
  requestAnimationFrame(frame);
}

function reveal() {
  document.getElementById('screen-intro').classList.add('hidden');
  document.getElementById('screen-heart').classList.add('visible');
  setTimeout(start, 80);
}

document.getElementById('decryptBtn').addEventListener('click', e => { e.stopPropagation(); reveal(); });
document.addEventListener('click', () => {
  if (!document.getElementById('screen-heart').classList.contains('visible')) reveal();
});
</script>
</body>
</html>
