<script>
  const btnNo  = document.getElementById('btnNo');
  const btnYes = document.getElementById('btnYes');
  const margin = 16;

  // Position "Нет" in its natural place next to "Да" initially
  requestAnimationFrame(() => {
    const r = btnYes.getBoundingClientRect();
    btnNo.style.left = (r.right + 20) + 'px';
    btnNo.style.top  = r.top + 'px';
  });

  function jumpNo() {
    const bw = btnNo.offsetWidth;
    const bh = btnNo.offsetHeight;
    const x = margin + Math.random() * (window.innerWidth  - bw - margin * 2);
    const y = margin + Math.random() * (window.innerHeight - bh - margin * 2);
    btnNo.style.left = x + 'px';
    btnNo.style.top  = y + 'px';
  }

  btnNo.addEventListener('mouseenter', jumpNo);
  btnNo.addEventListener('touchstart', e => { e.preventDefault(); jumpNo(); }, { passive: false });

  btnYes.addEventListener('click', () => {
    document.getElementById('question-state').style.display = 'none';
    btnNo.style.display = 'none';
    document.getElementById('thank-you').style.display = 'flex';
  });
</script>
